<svg xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif,system-ui,Helvetica,Arial,sans-serif" viewBox="0 0 980 620"><defs><linearGradient id="hm-brain" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#fef3c7"/><stop offset="1" stop-color="#fde68a"/></linearGradient><linearGradient id="hm-backend" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#ede9fe"/><stop offset="1" stop-color="#ddd6fe"/></linearGradient><marker id="hm-arr" markerHeight="8" markerWidth="8" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#7c3aed" d="M0,0 L10,5 L0,10 z"/></marker><marker id="hm-arr-gray" markerHeight="7" markerWidth="7" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#94a3b8" d="M0,0 L10,5 L0,10 z"/></marker></defs><rect width="980" height="620" fill="#f8fafc"/><text x="490" y="38" fill="#0f172a" font-size="22" font-weight="700" text-anchor="middle">harness manager — v0.9.0</text><text x="490" y="62" fill="#475569" font-size="13" text-anchor="middle">manifest-driven adapter system: verb subcommands, interactive TUI, cross-platform Python backend</text><g><text x="40" y="0" fill="#334155" font-size="12" font-weight="600" transform="translate(0,90)">USER COMMANDS</text><g transform="translate(0,90) translate(40,12)"><rect width="280" height="92" fill="#fff" stroke="#7c3aed" stroke-width="1.5" rx="10"/><text x="140" y="22" fill="#5b21b6" font-size="12" font-weight="700" text-anchor="middle">first-time onboarding</text><text x="140" y="44" fill="#0f172a" font-family="ui-monospace,Menlo,monospace" font-size="13" text-anchor="middle">./install.sh</text><text x="140" y="64" fill="#64748b" font-size="10" text-anchor="middle">multi-select wizard</text><text x="140" y="78" fill="#64748b" font-size="10" text-anchor="middle">auto-detects existing harnesses</text></g><g transform="translate(0,90) translate(350,12)"><rect width="280" height="92" fill="#fff" stroke="#7c3aed" stroke-width="1.5" rx="10"/><text x="140" y="22" fill="#5b21b6" font-size="12" font-weight="700" text-anchor="middle">scriptable verbs</text><text x="140" y="42" fill="#0f172a" font-family="ui-monospace,Menlo,monospace" font-size="11" text-anchor="middle">./install.sh add &lt;name&gt;</text><text x="140" y="58" fill="#0f172a" font-family="ui-monospace,Menlo,monospace" font-size="11" text-anchor="middle">./install.sh remove · doctor · status</text><text x="140" y="78" fill="#64748b" font-size="10" text-anchor="middle">CI-safe · idempotent · tracked</text></g><g transform="translate(0,90) translate(660,12)"><rect width="280" height="92" fill="#fff" stroke="#7c3aed" stroke-width="1.5" rx="10"/><text x="140" y="22" fill="#5b21b6" font-size="12" font-weight="700" text-anchor="middle">interactive TUI</text><text x="140" y="44" fill="#0f172a" font-family="ui-monospace,Menlo,monospace" font-size="13" text-anchor="middle">./install.sh manage</text><text x="140" y="64" fill="#64748b" font-size="10" text-anchor="middle">menu loop · header pane</text><text x="140" y="78" fill="#64748b" font-size="10" text-anchor="middle">add · remove · doctor · status</text></g></g><g fill="none" stroke="#7c3aed" stroke-width="1.5" opacity=".6"><path marker-end="url(#hm-arr)" d="M 180 220 L 280 250"/><path marker-end="url(#hm-arr)" d="M 490 220 L 490 250"/><path marker-end="url(#hm-arr)" d="M 800 220 L 700 250"/></g><g transform="translate(0,250)"><text x="40" y="0" fill="#334155" font-size="12" font-weight="600">PYTHON BACKEND · harness_manager/</text><rect width="900" height="110" x="40" y="12" fill="url(#hm-backend)" stroke="#7c3aed" stroke-width="1.5" rx="10"/><g fill="#1e1b4b" font-size="11"><g><text fill="#5b21b6" font-weight="700" transform="translate(70,40)">schema.py</text><text y="16" transform="translate(70,40)">validates each</text><text y="30" transform="translate(70,40)">adapter.json</text></g><g><text fill="#5b21b6" font-weight="700" transform="translate(220,40)">install.py</text><text y="16" transform="translate(220,40)">applies file entries</text><text y="30" transform="translate(220,40)">per merge_policy</text></g><g><text fill="#5b21b6" font-weight="700" transform="translate(370,40)">state.py</text><text y="16" transform="translate(370,40)">install.json read-modify-</text><text y="30" transform="translate(370,40)">write under fcntl/msvcrt lock</text></g><g><text fill="#5b21b6" font-weight="700" transform="translate(560,40)">post_install.py</text><text y="16" transform="translate(560,40)">named built-ins</text><text y="30" transform="translate(560,40)">(openclaw_register…)</text></g><g><text fill="#5b21b6" font-weight="700" transform="translate(720,40)">doctor.py + remove.py</text><text y="16" transform="translate(720,40)">audit + safe uninstall</text><text y="30" transform="translate(720,40)">shared-file detection</text></g></g></g><path fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#hm-arr)" d="M 490 372 L 490 402"/><g><text x="40" y="0" fill="#334155" font-size="12" font-weight="600" transform="translate(0,402)">10 ADAPTERS · manifest = adapter.json</text><g fill="#0f172a" font-size="10"><g transform="translate(0,402) translate(40,12)"><rect width="86" height="40" fill="#fff" stroke="#94a3b8" rx="6"/><text x="43" y="18" font-weight="600" text-anchor="middle">claude-code</text><text x="43" y="32" fill="#64748b" font-size="9" text-anchor="middle">CLAUDE.md+hooks</text></g><g transform="translate(0,402) translate(132,12)"><rect width="86" height="40" fill="#fff" stroke="#94a3b8" rx="6"/><text x="43" y="18" font-weight="600" text-anchor="middle">cursor</text><text x="43" y="32" fill="#64748b" font-size="9" text-anchor="middle">.cursor/rules</text></g><g transform="translate(0,402) translate(224,12)"><rect width="86" height="40" fill="#fff" stroke="#94a3b8" rx="6"/><text x="43" y="18" font-weight="600" text-anchor="middle">windsurf</text><text x="43" y="32" fill="#64748b" font-size="9" text-anchor="middle">.windsurfrules</text></g><g transform="translate(0,402) translate(316,12)"><rect width="86" height="40" fill="#fff" stroke="#94a3b8" rx="6"/><text x="43" y="18" font-weight="600" text-anchor="middle">opencode</text><text x="43" y="32" fill="#64748b" font-size="9" text-anchor="middle">opencode.json</text></g><g transform="translate(0,402) translate(408,12)"><rect width="86" height="40" fill="#fff" stroke="#94a3b8" rx="6"/><text x="43" y="18" font-weight="600" text-anchor="middle">openclaw</text><text x="43" y="32" fill="#64748b" font-size="9" text-anchor="middle">.openclaw-system</text></g><g transform="translate(0,402) translate(500,12)"><rect width="86" height="40" fill="#fff" stroke="#94a3b8" rx="6"/><text x="43" y="18" font-weight="600" text-anchor="middle">hermes</text><text x="43" y="32" fill="#64748b" font-size="9" text-anchor="middle">AGENTS.md</text></g><g transform="translate(0,402) translate(592,12)"><rect width="86" height="40" fill="#fff" stroke="#94a3b8" rx="6"/><text x="43" y="18" font-weight="600" text-anchor="middle">pi</text><text x="43" y="32" fill="#64748b" font-size="9" text-anchor="middle">.pi/extensions</text></g><g transform="translate(0,402) translate(684,12)"><rect width="86" height="40" fill="#fff" stroke="#94a3b8" rx="6"/><text x="43" y="18" font-weight="600" text-anchor="middle">codex</text><text x="43" y="32" fill="#64748b" font-size="9" text-anchor="middle">user skills</text></g><g transform="translate(0,402) translate(776,12)"><rect width="86" height="40" fill="#fff" stroke="#94a3b8" rx="6"/><text x="43" y="18" font-weight="600" text-anchor="middle">standalone-py</text><text x="43" y="32" fill="#64748b" font-size="9" text-anchor="middle">run.py</text></g><g transform="translate(0,402) translate(868,12)"><rect width="80" height="40" fill="#fff" stroke="#94a3b8" rx="6"/><text x="40" y="18" font-weight="600" text-anchor="middle">antigravity</text><text x="40" y="32" fill="#64748b" font-size="9" text-anchor="middle">ANTIGRAVITY.md</text></g></g></g><g fill="none" stroke="#94a3b8" stroke-width=".8" opacity=".45"><p